<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Toon — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #7ed6cb; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.45); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; line-height: 1.8;
      pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: #fff;
      padding: 10px 16px; border-radius: 8px;
      font-size: 12px; text-align: center;
      pointer-events: none;
    }
    label { pointer-events: all; cursor: pointer; }
    input[type=range] { pointer-events: all; cursor: pointer; }
    #params {
      position: fixed; top: 16px; right: 16px;
      background: rgba(0,0,0,0.5); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-size: 12px; line-height: 2;
      width: 210px;
    }
    #params input[type=range] { width: 100%; }
    #params select { background: #333; color: #fff; border: none; padding: 2px 4px; }
  </style>
</head>
<body>
<div id="ui">
  <strong>Island Toon</strong> — shader demo<br>
  Three.js toon shading + custom outline pass<br>
  <span id="info" style="color:#aef">Drag to orbit</span>
</div>

<div id="params">
  <strong>Toon Settings</strong><br>

  <label>Gradient steps:
    <select id="gradSteps">
      <option value="2">2 — harsh</option>
      <option value="3" selected>3 — standard</option>
      <option value="4">4 — soft</option>
    </select>
  </label><br>

  <label>Outline thickness: <span id="thickVal">1.0</span>
    <input type="range" id="thickness" min="0.5" max="4" step="0.1" value="1.0">
  </label>

  <label>Depth threshold: <span id="depthVal">0.002</span>
    <input type="range" id="depthThresh" min="0.0001" max="0.02" step="0.0001" value="0.002">
  </label>

  <label>Normal threshold: <span id="normVal">0.30</span>
    <input type="range" id="normThresh" min="0.05" max="1.0" step="0.01" value="0.30">
  </label>

  <label>Outline strength: <span id="strVal">1.0</span>
    <input type="range" id="strength" min="0" max="1" step="0.05" value="1.0">
  </label>

  <label><input type="checkbox" id="outlineToggle" checked> Outlines</label>&nbsp;
  <label><input type="checkbox" id="fogToggle" checked> Fog</label>
</div>

<div id="controls">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

import { GRAD2, GRAD3, GRAD4, makeGradient } from './src/gradient.js';
import { OutlinePass }   from './src/outline-pass.js';
import { renderNormals, createNormalTarget } from './src/normal-pass.js';

// ─── Renderer ────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: false }); // no AA — outline handles edges
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── Scene + Camera ──────────────────────────────────────────────────────────
var scene  = new THREE.Scene();
var SKY    = 0x7ed6cb;
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 40, 100);

var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(20, 18, 28);

var controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ─── Lighting (toon still needs directional light for shadow bands) ───────────
var ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

var sun = new THREE.DirectionalLight(0xfff5e0, 1.6);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 200;
sun.shadow.camera.left = sun.shadow.camera.bottom = -40;
sun.shadow.camera.right = sun.shadow.camera.top   =  40;
scene.add(sun);

// ─── Gradient maps ────────────────────────────────────────────────────────────
var gradients = { '2': GRAD2, '3': GRAD3, '4': GRAD4 };
var activeGrad = GRAD3;

// ─── Build scene objects ──────────────────────────────────────────────────────

function toon(color) {
  return new THREE.MeshToonMaterial({ color, gradientMap: activeGrad });
}

// Ground
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  toon(0x52b030)
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Voxel-style terrain mounds
function mound(x, z, r, h, color) {
  var geo = new THREE.CylinderGeometry(r * 0.6, r, h, 6);
  var m   = new THREE.Mesh(geo, toon(color));
  m.position.set(x, h / 2, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
}
mound( 0,   0,  5, 8, 0x8a949c); // mountain
mound( 1,   1,  3, 12, 0x7a8490);
mound( 0.5, 0.5,1.5, 15, 0xeef2f8); // snow cap

// Houses
function house(x, z, wallCol, roofCol) {
  var wall = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 3), toon(wallCol));
  wall.position.set(x, 1.25, z);
  wall.castShadow = wall.receiveShadow = true;
  scene.add(wall);

  var roof = new THREE.Mesh(new THREE.ConeGeometry(2.2, 2, 4), toon(roofCol));
  roof.position.set(x, 3.5, z);
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  scene.add(roof);

  // Door
  var door = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.1, 0.1), toon(0x7a4e18));
  door.position.set(x, 0.55, z + 1.55);
  scene.add(door);

  // Window
  var win = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.1), toon(0x9dd7e0));
  win.position.set(x + 0.7, 1.6, z + 1.55);
  scene.add(win);
}

house(-8, -4, 0xf5e8d0, 0xc04a2a);
house(-5, -6, 0xe8dfc8, 0x8b3a1e);
house(-2, -5, 0xd9e8d0, 0x3a6b2a);
house( 4, -8, 0xf0e0c0, 0xb84020);
house( 7, -5, 0xe0d5c0, 0x5a3a18);

// Trees
function tree(x, z, h, leafCol) {
  var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, h * 0.5, 6), toon(0x5a3010));
  trunk.position.set(x, h * 0.25, z);
  trunk.castShadow = true;
  scene.add(trunk);

  for (var i = 0; i < 3; i++) {
    var r = 0.9 - i * 0.2;
    var cone = new THREE.Mesh(new THREE.ConeGeometry(r, 1.4, 6), toon(leafCol));
    cone.position.set(x, h * 0.5 + i * 0.9, z);
    cone.castShadow = true;
    scene.add(cone);
  }
}

function oak(x, z) {
  var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 1.5, 6), toon(0x5a3010));
  trunk.position.set(x, 0.75, z);
  trunk.castShadow = true;
  scene.add(trunk);
  var canopy = new THREE.Mesh(new THREE.SphereGeometry(1.4, 6, 5), toon(0x38cc4a));
  canopy.position.set(x, 2.6, z);
  canopy.castShadow = true;
  scene.add(canopy);
}

tree( 10,  2, 4, 0x224e1c);
tree( 12, -1, 5, 0x1e4818);
tree( 11,  5, 3.5, 0x2a5820);
tree( 14,  3, 4.5, 0x1c4016);
oak( -12,  2);
oak( -13,  5);
oak( -10,  7);
oak( -14,  8);
oak( -11, -2);

// Water plane
var water = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  toon(0x2e8db5)
);
water.rotation.x = -Math.PI / 2;
water.position.y = -0.15;
scene.add(water);

// ─── Post-processing setup ────────────────────────────────────────────────────
var normalTarget = createNormalTarget(renderer);

// Main composer needs a depth texture
var depthTex = new THREE.DepthTexture();
depthTex.type   = THREE.UnsignedShortType;
depthTex.format = THREE.DepthFormat;

var sz = renderer.getSize(new THREE.Vector2());
var renderTarget = new THREE.WebGLRenderTarget(sz.x, sz.y, {
  minFilter:    THREE.NearestFilter,
  magFilter:    THREE.NearestFilter,
  format:       THREE.RGBAFormat,
  depthTexture: depthTex,
});

var composer = new EffectComposer(renderer, renderTarget);
composer.addPass(new RenderPass(scene, camera));

var outlinePass = new OutlinePass({
  camera,
  normalTarget,
  outlineColor:    0x1a1a1a,
  thickness:       1.0,
  depthThreshold:  0.002,
  normalThreshold: 0.30,
  strength:        1.0,
});
outlinePass.renderToScreen = false;
composer.addPass(outlinePass);

var outputPass = new OutputPass();
outputPass.renderToScreen = true;
composer.addPass(outputPass);

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  normalTarget.setSize(window.innerWidth, window.innerHeight);
});

// ─── UI controls ─────────────────────────────────────────────────────────────

function updateAllToon() {
  scene.traverse(function(obj) {
    if (obj.isMesh && obj.material && obj.material.isMeshToonMaterial) {
      obj.material.gradientMap = activeGrad;
      obj.material.needsUpdate = true;
    }
  });
}

document.getElementById('gradSteps').addEventListener('change', function(e) {
  activeGrad = gradients[e.target.value];
  updateAllToon();
});

document.getElementById('thickness').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uThickness.value = v;
  document.getElementById('thickVal').textContent = v.toFixed(1);
});
document.getElementById('depthThresh').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uDepthThreshold.value = v;
  document.getElementById('depthVal').textContent = v.toFixed(4);
});
document.getElementById('normThresh').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uNormalThreshold.value = v;
  document.getElementById('normVal').textContent = v.toFixed(2);
});
document.getElementById('strength').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uOutlineStrength.value = v;
  document.getElementById('strVal').textContent = v.toFixed(2);
});
document.getElementById('outlineToggle').addEventListener('change', function(e) {
  outlinePass.enabled = e.target.checked;
});
document.getElementById('fogToggle').addEventListener('change', function(e) {
  scene.fog = e.target.checked ? new THREE.Fog(SKY, 40, 100) : null;
  scene.background = new THREE.Color(e.target.checked ? SKY : 0x222222);
});

// ─── Render loop ─────────────────────────────────────────────────────────────
var clock = new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);
  var dt = clock.getDelta();
  controls.update();

  // Gentle water bob (cheap: just move the y position)
  water.position.y = -0.15 + Math.sin(clock.elapsedTime * 0.8) * 0.04;

  // Render normal G-buffer first
  renderNormals(renderer, scene, camera, normalTarget);

  // Then main composer
  composer.render(dt);
}

loop();
</script>
</body>
</html>
