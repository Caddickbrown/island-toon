<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Toon — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #7ed6cb; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.45); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; line-height: 1.8;
      pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: #fff;
      padding: 10px 16px; border-radius: 8px;
      font-size: 12px; text-align: center;
      pointer-events: none;
    }
    label { pointer-events: all; cursor: pointer; }
    input[type=range] { pointer-events: all; cursor: pointer; }
    #params {
      position: fixed; top: 16px; right: 16px;
      background: rgba(0,0,0,0.5); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-size: 12px; line-height: 2;
      width: 220px;
    }
    #params input[type=range] { width: 100%; }
    #params select {
      background: #333; color: #fff; border: none;
      padding: 2px 6px; border-radius: 4px; width: 100%;
    }
    .section-heading {
      color: #aef; font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 8px; margin-bottom: 2px;
      border-top: 1px solid rgba(255,255,255,0.15); padding-top: 8px;
    }
    .section-heading:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    /* Shader mode buttons */
    #shaderBtns {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px;
    }
    #shaderBtns button {
      flex: 1; background: #333; color: #ccc; border: 1px solid #555;
      padding: 3px 6px; border-radius: 4px; font-size: 11px; cursor: pointer;
      pointer-events: all;
    }
    #shaderBtns button.active {
      background: #4a8; color: #fff; border-color: #6ec;
    }
  </style>
</head>
<body>
<div id="ui">
  <strong>Island Toon</strong> — shader demo<br>
  Three.js toon shading + custom outline pass<br>
  <span id="info" style="color:#aef">Drag to orbit</span>
</div>

<div id="params">
  <div class="section-heading">Shader Mode</div>
  <div id="shaderBtns">
    <button class="active" data-mode="toon">Toon</button>
    <button data-mode="standard">PBR</button>
    <button data-mode="flat">Flat</button>
    <button data-mode="wireframe">Wire</button>
  </div>

  <div class="section-heading">Toon Settings</div>
  <label>Gradient steps:
    <select id="gradSteps">
      <option value="2">2 — harsh</option>
      <option value="3" selected>3 — standard</option>
      <option value="4">4 — soft</option>
    </select>
  </label>

  <div class="section-heading">Outline Settings</div>
  <label>Thickness: <span id="thickVal">1.0</span>
    <input type="range" id="thickness" min="0.5" max="4" step="0.1" value="1.0">
  </label>
  <label>Depth threshold: <span id="depthVal">0.002</span>
    <input type="range" id="depthThresh" min="0.0001" max="0.02" step="0.0001" value="0.002">
  </label>
  <label>Normal threshold: <span id="normVal">0.30</span>
    <input type="range" id="normThresh" min="0.05" max="1.0" step="0.01" value="0.30">
  </label>
  <label>Strength: <span id="strVal">1.0</span>
    <input type="range" id="strength" min="0" max="1" step="0.05" value="1.0">
  </label>

  <div class="section-heading">Environment</div>
  <label><input type="checkbox" id="outlineToggle" checked> Outlines</label>&nbsp;
  <label><input type="checkbox" id="fogToggle" checked> Fog</label>
</div>

<div id="controls">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

import { GRAD2, GRAD3, GRAD4 } from './src/gradient.js';
import { OutlinePass }          from './src/outline-pass.js';
import { renderNormals, createNormalTarget } from './src/normal-pass.js';

// ─── Renderer ────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── Scene + Camera ──────────────────────────────────────────────────────────
var scene  = new THREE.Scene();
var SKY    = 0x7ed6cb;
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 60, 160);

var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(45, 38, 65);

var controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 4, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ─── Lighting ─────────────────────────────────────────────────────────────────
var ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

var sun = new THREE.DirectionalLight(0xfff5e0, 1.7);
sun.position.set(50, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 350;
sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
sun.shadow.camera.right = sun.shadow.camera.top   =  80;
scene.add(sun);

// subtle fill from opposite side
var fill = new THREE.DirectionalLight(0xb0e0f5, 0.35);
fill.position.set(-30, 20, -20);
scene.add(fill);

// ─── Gradient maps ────────────────────────────────────────────────────────────
var gradients = { '2': GRAD2, '3': GRAD3, '4': GRAD4 };
var activeGrad = GRAD3;

// ─── Shader mode system ───────────────────────────────────────────────────────
var SHADER_MODE = 'toon';
var meshColors = []; // [{mesh, color}] — ordered so we can rebuild

function matFor(color) {
  switch (SHADER_MODE) {
    case 'standard':
      return new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.0 });
    case 'flat':
      return new THREE.MeshLambertMaterial({ color, flatShading: true });
    case 'wireframe':
      return new THREE.MeshBasicMaterial({ color, wireframe: true });
    default: // 'toon'
      return new THREE.MeshToonMaterial({ color, gradientMap: activeGrad });
  }
}

function toon(color) {
  var mat = matFor(color);
  return mat;
}

// register mesh + track its colour for later rebuilds
function addMesh(mesh, color) {
  meshColors.push({ mesh, color });
  return mesh;
}

function make(geo, color, castShadow, receiveShadow) {
  var m = new THREE.Mesh(geo, toon(color));
  if (castShadow !== false)   m.castShadow = true;
  if (receiveShadow !== false) m.receiveShadow = true;
  meshColors.push({ mesh: m, color });
  return m;
}

function rebuildAllMaterials() {
  for (var i = 0; i < meshColors.length; i++) {
    var entry = meshColors[i];
    entry.mesh.material.dispose();
    entry.mesh.material = matFor(entry.color);
  }
}

// ─── Scene geometry helpers ───────────────────────────────────────────────────

// Box shortcut
function box(w, h, d, color, x, y, z, ry) {
  var m = make(new THREE.BoxGeometry(w, h, d), color);
  m.position.set(x, y + h / 2, z);
  if (ry) m.rotation.y = ry;
  scene.add(m);
  return m;
}

// Cylinder shortcut
function cyl(rt, rb, h, segs, color, x, y, z) {
  var m = make(new THREE.CylinderGeometry(rt, rb, h, segs), color);
  m.position.set(x, y + h / 2, z);
  scene.add(m);
  return m;
}

// Cone shortcut
function cone(r, h, segs, color, x, y, z, ry) {
  var m = make(new THREE.ConeGeometry(r, h, segs), color);
  m.position.set(x, y + h / 2, z);
  if (ry) m.rotation.y = ry;
  scene.add(m);
  return m;
}

// Sphere shortcut
function sphere(r, ws, hs, color, x, y, z) {
  var m = make(new THREE.SphereGeometry(r, ws, hs), color);
  m.position.set(x, y, z);
  scene.add(m);
  return m;
}

// ─── TERRAIN ──────────────────────────────────────────────────────────────────

// Ocean (static water — no toon so not in meshColors, handled separately)
var waterMat = new THREE.MeshToonMaterial({ color: 0x2e8db5, gradientMap: activeGrad });
var water = new THREE.Mesh(new THREE.PlaneGeometry(200, 200, 1, 1), waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -0.5;
water.receiveShadow = true;
scene.add(water);

// Island ground (main mass)
var ground = make(new THREE.CylinderGeometry(46, 50, 3.5, 24), 0x52b030, false, true);
ground.position.set(0, -2.5, 0);
scene.add(ground);

// Sandy beach ring
var beach = make(new THREE.CylinderGeometry(50, 52, 1.2, 24), 0xe8d5a3, false, true);
beach.position.set(0, -3.2, 0);
scene.add(beach);

// Flat plains (base surface level)
var plains = make(new THREE.CylinderGeometry(36, 44, 0.5, 24), 0x52b030, false, true);
plains.position.set(0, 0.2, 0);
scene.add(plains);

// ─── MOUNTAIN (NW) ────────────────────────────────────────────────────────────
// Base
cyl(4, 14, 9, 8, 0x8a949c, -22, 0, -20);
// Mid section
cyl(2.5, 5, 7, 8, 0x7a8490, -22, 9, -20);
// Peak snow
cyl(0.3, 2.8, 5, 8, 0xeef2f8, -22, 16, -20);
// Snow cap dome
sphere(2.4, 8, 6, 0xeef2f8, -22, 21, -20);

// Rocky highland ridge (between mountain and town)
cyl(5, 8, 3, 10, 0x8a949c, -12, 0, -12);
cyl(3, 6, 2.5, 8, 0x8a949c, -6, 0, -16);

// ─── CLIFFS (NW coast) ────────────────────────────────────────────────────────
box(6, 5, 4, 0x6e7880, -34, -1, -18);
box(5, 4, 5, 0x6e7880, -32, -1, -10);
box(7, 6, 3, 0x6e7880, -36, -1, -26);

// ─── LIGHTHOUSE (SW rocky point) ─────────────────────────────────────────────
// Rocky platform
cyl(3, 4, 2, 8, 0x6e7880, -35, -0.5, 14);
// Tower
cyl(0.8, 1.1, 10, 10, 0xf5f0e0, -35, 1.5, 14);
// Red stripe
cyl(0.85, 0.85, 1.2, 10, 0xcc3322, -35, 7.5, 14);
// Lantern room
cyl(1.5, 1.5, 1.2, 10, 0x444444, -35, 11.5, 14);
// Glass dome
sphere(1.2, 8, 6, 0x9dd7e0, -35, 13, 14);
// Roof cone
cone(1.6, 1.5, 8, 0xcc3322, -35, 13, 14);

// ─── HARBOUR (S) ──────────────────────────────────────────────────────────────
// Harbour wall
box(22, 1.5, 2, 0x9a8878, 0, 0, 34);
box(2, 1.5, 12, 0x9a8878, -10, 0, 28);
box(2, 1.5, 12, 0x9a8878, 10, 0, 28);

// Dock planks (brown wooden pier)
box(4, 0.4, 16, 0x7a4e18, -4, 0, 38);
box(4, 0.4, 16, 0x7a4e18, 4, 0, 38);
// Pier posts
for (var pi = 0; pi < 5; pi++) {
  cyl(0.15, 0.2, 2.5, 4, 0x5a3010, -4 + pi * 2, -1, 40);
  cyl(0.15, 0.2, 2.5, 4, 0x5a3010, -4 + pi * 2, -1, 44);
}

// Boats
// Boat 1 (red hull)
box(2.5, 0.8, 5.5, 0xcc3322, -8, -0.4, 38);
box(1.5, 1.2, 0.3, 0xf5f0e0, -8, 0.4, 36.5); // cabin
cone(0.2, 4, 4, 0x5a3010, -8, 2, 38, 0); // mast

// Boat 2 (blue hull)
box(2.5, 0.8, 5, 0x336699, 9, -0.4, 40);
box(1.2, 1.0, 0.3, 0xf5f0e0, 9, 0.4, 39);
cone(0.2, 4, 4, 0x5a3010, 9, 2, 40, 0);

// Boat 3 (white fishing boat, further out)
box(3, 0.9, 6.5, 0xf0ece0, 3, -0.6, 47);
box(1.8, 1.3, 0.3, 0x8a949c, 3, 0.5, 45.5);

// Harbour buildings
box(5, 3.5, 4, 0xe8dfc8, -6, 0, 30);  // harbourmaster
cone(3, 2, 4, 0x8b3a1e, -6, 3.5, 30, Math.PI/4);
box(4, 3, 4, 0xd9e8d0, 6, 0, 29);     // fish market
cone(2.5, 2, 4, 0x3a6b2a, 6, 3, 29, Math.PI/4);

// ─── TOWN (centre) ────────────────────────────────────────────────────────────
// Market square (cobble slab)
var square = make(new THREE.CylinderGeometry(8, 8.5, 0.3, 12), 0xb0a090, false, true);
square.position.set(0, 0, 0);
scene.add(square);

// Market well
cyl(0.6, 0.7, 1.5, 8, 0x9a8878, 0, 0, 0);
cyl(0.65, 0.65, 0.3, 8, 0x5a3010, 0, 1.5, 0); // well cap
// Well posts
cyl(0.12, 0.12, 2, 5, 0x5a3010, -0.8, 0, 0);
cyl(0.12, 0.12, 2, 5, 0x5a3010, 0.8, 0, 0);
box(1.8, 0.15, 0.15, 0x5a3010, 0, 2, 0); // crossbeam

function house(x, z, wallCol, roofCol, ry) {
  // Walls (2 thick for visual depth)
  var wall = make(new THREE.BoxGeometry(3, 3, 3.5), wallCol);
  wall.position.set(x, 1.5, z);
  if (ry) wall.rotation.y = ry;
  wall.castShadow = wall.receiveShadow = true;
  scene.add(wall);

  // Chimney
  cyl(0.25, 0.3, 2, 4, 0x9a8878, x + 0.8, 3, z);

  // Roof
  var roof = make(new THREE.ConeGeometry(2.6, 2.2, 4), roofCol);
  roof.position.set(x, 4.1, z);
  roof.rotation.y = (ry || 0) + Math.PI / 4;
  roof.castShadow = true;
  scene.add(roof);

  // Door
  box(0.65, 1.1, 0.15, 0x7a4e18, x, 0, z + 1.78);
  // Window x2
  box(0.7, 0.55, 0.1, 0x9dd7e0, x + 0.85, 1.9, z + 1.78);
  box(0.7, 0.55, 0.1, 0x9dd7e0, x - 0.85, 1.9, z + 1.78);
}

// Town houses (ring around square)
house(-10,  2, 0xf5e8d0, 0xc04a2a);
house(-9,  -6, 0xe8dfc8, 0x8b3a1e);
house(-4,  -9, 0xd9e8d0, 0x3a6b2a);
house( 4,  -9, 0xf0e0c0, 0xb84020);
house( 10, -6, 0xe0d5c0, 0x5a3a18);
house( 10,  3, 0xf5e8d0, 0xa03520);
house( 3,   9, 0xe8dfc8, 0x3a6b2a);
house(-4,   9, 0xd4e0f0, 0x3a5a8a);
house(-11,  9, 0xf0e4d0, 0x8b3a1e);

// ─── CHURCH (NE of town) ─────────────────────────────────────────────────────
// Nave
box(5, 5, 9, 0xf5f0e0, 16, 0, -4);
// Chancel
box(3.5, 4.5, 4, 0xf5f0e0, 16, 0, 2.5);
// Roof nave
var churchRoof = make(new THREE.BoxGeometry(5.5, 1.5, 9.5), 0x8a949c);
churchRoof.position.set(16, 5.75, -4);
scene.add(churchRoof);
cone(3.1, 1.8, 4, 0x8a949c, 16, 5.5, -4, Math.PI/4);
// Bell tower
cyl(1.2, 1.4, 8, 8, 0xf5f0e0, 14, 0, -9);
cone(1.5, 2.5, 8, 0x8a949c, 14, 8, -9);
// Cross on tower
box(0.2, 1.8, 0.2, 0xaaaaaa, 14, 11.5, -9);
box(1, 0.2, 0.2, 0xaaaaaa, 14, 12, -9);
// Church door (arched — approximate with box)
box(1.2, 2.0, 0.15, 0x7a4e18, 16, 0, 1.2);
// Stained glass window
box(1.5, 2.0, 0.1, 0xd4a0c0, 16, 2.5, 1.25);

// ─── BAKER + SHOP (W of square) ───────────────────────────────────────────────
// Baker with chimney smoke suggestion
box(4.5, 3, 4, 0xf5e0c0, -14, 0, 4);
cone(3, 2, 4, 0xc04a2a, -14, 3, 4, Math.PI/4);
cyl(0.3, 0.35, 2.5, 5, 0x9a8878, -13, 3, 4);
cyl(0.3, 0.35, 2.5, 5, 0x9a8878, -15, 3, 4);
// Sign
box(1.5, 0.7, 0.15, 0x8b6f47, -14, 2.5, 6.1);

// General store
box(4, 3, 4, 0xe8dfc8, -14, 0, 12);
cone(2.8, 2, 4, 0x8b3a1e, -14, 3, 12, Math.PI/4);

// ─── PATHS ────────────────────────────────────────────────────────────────────
// Main road N-S through town (pebble coloured)
var road1 = make(new THREE.BoxGeometry(3, 0.08, 40), 0xb0a090, false, true);
road1.position.set(0, 0.05, 5);
scene.add(road1);
// E-W road
var road2 = make(new THREE.BoxGeometry(40, 0.08, 3), 0xb0a090, false, true);
road2.position.set(-5, 0.05, 0);
scene.add(road2);

// ─── FARM (W) ────────────────────────────────────────────────────────────────
// Crop rows
var CROP = 0x3ec858;
for (var fi = 0; fi < 5; fi++) {
  box(1.5, 0.6, 12, fi % 2 === 0 ? CROP : 0x52b030, -26 + fi * 2.5, 0, 8);
}
// Farmhouse
box(4.5, 3.5, 5, 0xf0e0c0, -30, 0, 4);
cone(3.2, 2.2, 4, 0x8b4820, -30, 3.5, 4, Math.PI/4);
// Barn
box(6, 4, 8, 0xaa4428, -30, 0, 14);
cone(3.8, 3, 4, 0x8a3010, -30, 4, 14, Math.PI/4);
// Hay bales
cyl(1.2, 1.2, 1.5, 10, 0xd4b840, -25, 0, 16, 0);
cyl(1.2, 1.2, 1.5, 10, 0xd4b840, -27, 0, 16, 0);
// Fence (thin posts)
for (var fp = 0; fp < 8; fp++) {
  cyl(0.1, 0.1, 1.2, 4, 0x7a4e18, -22 + fp * 1.8, 0, 19);
}

// ─── FISHING VILLAGE (SE) ────────────────────────────────────────────────────
house(18,  18, 0xf5e8d0, 0xc04a2a);
house(24,  22, 0xe8dfc8, 0x3a6b2a);
house(28,  16, 0xd9e8d0, 0x8b3a1e);
house(22,  28, 0xf0e0c0, 0xb84020);
// Net drying rack
cyl(0.12, 0.12, 3, 4, 0x5a3010, 16, 0, 24);
cyl(0.12, 0.12, 3, 4, 0x5a3010, 20, 0, 24);
box(4.5, 0.1, 0.1, 0x9a6030, 18, 3, 24); // crossbar

// ─── FOREST (NE) ─────────────────────────────────────────────────────────────
function pine(x, z, h) {
  cyl(0.18, 0.25, h * 0.45, 5, 0x5a3010, x, 0, z);
  for (var ti = 0; ti < 3; ti++) {
    var r  = (1.1 - ti * 0.22);
    var cy = h * 0.4 + ti * h * 0.22;
    cone(r, h * 0.28, 6, 0x224e1c, x, cy, z);
  }
}

function oak(x, z, h) {
  cyl(0.2, 0.25, h * 0.5, 6, 0x5a3010, x, 0, z);
  sphere(h * 0.32, 7, 5, 0x38cc4a, x, h * 0.6, z);
  sphere(h * 0.22, 6, 4, 0x2eb84a, x + h * 0.18, h * 0.65, z + h * 0.1);
  sphere(h * 0.22, 6, 4, 0x1a7832, x - h * 0.15, h * 0.6, z - h * 0.12);
}

// NE forest — dense
var forestTrees = [
  [20,-20,5], [24,-16,6], [27,-22,5.5], [22,-27,6.5], [30,-18,4.5],
  [25,-30,5], [32,-24,6], [18,-24,5], [28,-14,4], [35,-20,5.5],
  [33,-28,6], [26,-12,4.5], [20,-32,5], [38,-16,4], [30,-8,5],
  [36,-12,5.5], [23,-8,4.5], [40,-22,5], [15,-20,4.5], [18,-15,5],
];
for (var ft = 0; ft < forestTrees.length; ft++) {
  var td = forestTrees[ft];
  if (ft % 3 === 0) oak(td[0], td[1], td[2]);
  else pine(td[0], td[1], td[2]);
}

// Highland forest (NW, near mountain)
var highlandTrees = [
  [-16,-8,4], [-14,-14,4.5], [-18,-16,4], [-10,-10,4.5], [-8,-18,5],
  [-20,-6,3.5], [-12,-20,4], [-6,-14,4.5],
];
for (var ht = 0; ht < highlandTrees.length; ht++) {
  var hd = highlandTrees[ht];
  pine(hd[0], hd[1], hd[2]);
}

// Scattered oaks near town
oak(-16, 2, 4.5);
oak(-18,-2, 5);
oak( 14, 6, 4);
oak( 12, 10, 5);
oak(-12, 14, 4.5);
oak( 6, 14, 4);
oak(-6, 16, 5);

// Shoreline palms (SE beach)
function palm(x, z) {
  var h = 3.5 + Math.random() * 1.5;
  cyl(0.12, 0.18, h, 5, 0x6b4010, x, 0, z);
  sphere(1.4, 6, 4, 0x26c050, x, h, z);
  sphere(0.9, 5, 3, 0x30a840, x + 0.8, h - 0.3, z + 0.5);
}
palm(36, 4); palm(38, 8); palm(40, 16); palm(38, 24); palm(34, 30);

// ─── SALT MARSH (W coast) ────────────────────────────────────────────────────
var marsh = make(new THREE.CylinderGeometry(8, 9, 0.5, 12), 0x267a34, false, true);
marsh.position.set(-38, 0, 6);
scene.add(marsh);
// Reeds (thin sticks)
for (var ri = 0; ri < 12; ri++) {
  var ra = ri * Math.PI * 2 / 12;
  cyl(0.08, 0.1, 2, 4, 0x3a6030, -38 + Math.cos(ra)*5, 0.3, 6 + Math.sin(ra)*5);
}

// ─── BOULDERS scattered ───────────────────────────────────────────────────────
sphere(1.4, 6, 5, 0x6e7880, -28, 0.5, -4);
sphere(1.1, 6, 5, 0x7a8490, -26, 0.3, -7);
sphere(1.6, 6, 5, 0x6e7880, -3, 0.4, -28);
sphere(1.0, 6, 5, 0x7a8490, 2, 0.3, -30);
sphere(1.3, 6, 5, 0x6e7880, 30, 0.4, -4);
sphere(0.9, 6, 5, 0x7a8490, 32, 0.3, -2);

// ─── Post-processing setup ────────────────────────────────────────────────────
var normalTarget = createNormalTarget(renderer);

var depthTex = new THREE.DepthTexture();
depthTex.type   = THREE.UnsignedShortType;
depthTex.format = THREE.DepthFormat;

var sz = renderer.getSize(new THREE.Vector2());
var renderTarget = new THREE.WebGLRenderTarget(sz.x, sz.y, {
  minFilter:    THREE.NearestFilter,
  magFilter:    THREE.NearestFilter,
  format:       THREE.RGBAFormat,
  depthTexture: depthTex,
});

var composer = new EffectComposer(renderer, renderTarget);
composer.addPass(new RenderPass(scene, camera));

var outlinePass = new OutlinePass({
  camera,
  normalTarget,
  outlineColor:    0x1a1a1a,
  thickness:       1.0,
  depthThreshold:  0.002,
  normalThreshold: 0.30,
  strength:        1.0,
});
outlinePass.renderToScreen = false;
composer.addPass(outlinePass);

var outputPass = new OutputPass();
outputPass.renderToScreen = true;
composer.addPass(outputPass);

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  normalTarget.setSize(window.innerWidth, window.innerHeight);
});

// ─── UI: Shader mode toggle ───────────────────────────────────────────────────
document.getElementById('shaderBtns').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  SHADER_MODE = btn.dataset.mode;
  document.querySelectorAll('#shaderBtns button').forEach(function(b) {
    b.classList.toggle('active', b === btn);
  });
  rebuildAllMaterials();
  // Water material too
  waterMat.dispose();
  waterMat = matFor(0x2e8db5);
  water.material = waterMat;
  // If wireframe on water doesn't look great with rotation, that's fine
  // Toon gradient controls only apply in toon mode
  document.getElementById('gradSteps').closest('label').style.opacity =
    SHADER_MODE === 'toon' ? '1' : '0.4';
  outlinePass.enabled = document.getElementById('outlineToggle').checked &&
    SHADER_MODE !== 'wireframe';
});

// ─── UI: Toon controls ────────────────────────────────────────────────────────
document.getElementById('gradSteps').addEventListener('change', function(e) {
  activeGrad = gradients[e.target.value];
  if (SHADER_MODE !== 'toon') return;
  for (var i = 0; i < meshColors.length; i++) {
    var mat = meshColors[i].mesh.material;
    if (mat.isMeshToonMaterial) { mat.gradientMap = activeGrad; mat.needsUpdate = true; }
  }
  waterMat.gradientMap = activeGrad;
  waterMat.needsUpdate = true;
});

document.getElementById('thickness').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uThickness.value = v;
  document.getElementById('thickVal').textContent = v.toFixed(1);
});
document.getElementById('depthThresh').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uDepthThreshold.value = v;
  document.getElementById('depthVal').textContent = v.toFixed(4);
});
document.getElementById('normThresh').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uNormalThreshold.value = v;
  document.getElementById('normVal').textContent = v.toFixed(2);
});
document.getElementById('strength').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  outlinePass.uniforms.uOutlineStrength.value = v;
  document.getElementById('strVal').textContent = v.toFixed(2);
});
document.getElementById('outlineToggle').addEventListener('change', function(e) {
  outlinePass.enabled = e.target.checked;
});
document.getElementById('fogToggle').addEventListener('change', function(e) {
  scene.fog = e.target.checked ? new THREE.Fog(SKY, 60, 160) : null;
  scene.background = new THREE.Color(e.target.checked ? SKY : 0x222233);
  water.material.color.set(e.target.checked ? 0x2e8db5 : 0x1a5a7a);
});

// ─── Render loop ─────────────────────────────────────────────────────────────
var clock = new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);
  var dt  = clock.getDelta();
  var et  = clock.elapsedTime;
  controls.update();

  // Gentle water bob
  water.position.y = -0.5 + Math.sin(et * 0.7) * 0.06;

  // Outline pass only makes sense in toon/standard/flat modes
  var useOutline = outlinePass.enabled && SHADER_MODE !== 'wireframe';
  if (useOutline) {
    renderNormals(renderer, scene, camera, normalTarget);
    composer.render(dt);
  } else {
    renderer.render(scene, camera);
  }
}

loop();
</script>
</body>
</html>
